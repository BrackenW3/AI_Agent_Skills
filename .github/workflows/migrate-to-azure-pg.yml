name: Migrate Vectors to Azure PostgreSQL
on:
  workflow_dispatch:

jobs:
  setup-azure-pg:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Install deps
        run: pip install httpx psycopg2-binary --break-system-packages -q

      - name: Setup pgvector on Azure PostgreSQL
        env:
          AZURE_PG_PASSWORD: ${{ secrets.AZURE_POSTGRES_WB0414 }}
        shell: python
        run: |
          import psycopg2, os
          pw = os.environ.get('AZURE_PG_PASSWORD','')
          if not pw:
              print('AZURE_POSTGRES_WB0414 not set - skipping')
              exit(0)
          try:
              conn = psycopg2.connect(
                  host='willbracken-pg-wb0414.postgres.database.azure.com',
                  database='postgres', user='willbrackenadmin',
                  password=pw, sslmode='require', connect_timeout=30)
              conn.autocommit = True
              cur = conn.cursor()
              cur.execute("CREATE EXTENSION IF NOT EXISTS vector;")
              cur.execute("""
                  CREATE TABLE IF NOT EXISTS documents (
                      id TEXT PRIMARY KEY,
                      content TEXT,
                      embedding vector(1536),
                      file_path TEXT,
                      file_source TEXT,
                      metadata JSONB,
                      summary TEXT,
                      entities JSONB,
                      doc_type TEXT,
                      enriched_at TIMESTAMPTZ,
                      created_at TIMESTAMPTZ DEFAULT NOW()
                  );
              """)
              cur.execute("CREATE INDEX IF NOT EXISTS idx_doc_source ON documents(file_source);")
              cur.execute("CREATE INDEX IF NOT EXISTS idx_doc_path ON documents(file_path);")
              cur.execute("""
                  CREATE INDEX IF NOT EXISTS idx_doc_embedding
                  ON documents USING ivfflat (embedding vector_cosine_ops) WITH (lists = 100);
              """)
              cur.close()
              conn.close()
              print('Azure PostgreSQL setup COMPLETE - pgvector enabled, table and indexes created')
          except Exception as e:
              print(f'Setup failed: {e}')
              exit(1)

  migrate:
    needs: setup-azure-pg
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Install deps
        run: pip install httpx psycopg2-binary --break-system-packages -q

      - name: Migrate documents Supabase -> Azure PostgreSQL
        env:
          AZURE_PG_PASSWORD: ${{ secrets.AZURE_POSTGRES_WB0414 }}
          SB_URL: https://smttdhtpwkowcyatoztb.supabase.co
          SB_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        shell: python
        run: |
          import psycopg2, httpx, json, os, time

          pw = os.environ['AZURE_PG_PASSWORD']
          SB_URL = os.environ['SB_URL']
          SB_KEY = os.environ['SB_KEY']

          conn = psycopg2.connect(
              host='willbracken-pg-wb0414.postgres.database.azure.com',
              database='postgres', user='willbrackenadmin',
              password=pw, sslmode='require', connect_timeout=30)
          cur = conn.cursor()

          sb = {'apikey': SB_KEY, 'Authorization': f'Bearer {SB_KEY}'}

          offset = 0
          total = 0
          errors = 0
          batch = 100

          while True:
              try:
                  r = httpx.get(f'{SB_URL}/rest/v1/documents', headers=sb,
                      params={'select':'id,content,embedding,file_path,file_source,metadata,summary,entities,doc_type,enriched_at',
                              'limit': str(batch), 'offset': str(offset)}, timeout=60)
                  docs = r.json() if r.is_success and isinstance(r.json(), list) else []
              except Exception as e:
                  print(f'Fetch error at offset {offset}: {e}')
                  break

              if not docs:
                  break

              for doc in docs:
                  if not isinstance(doc, dict):
                      continue
                  try:
                      emb = doc.get('embedding')
                      cur.execute(
                          """INSERT INTO documents
                              (id,content,embedding,file_path,file_source,metadata,summary,entities,doc_type,enriched_at)
                             VALUES (%s,%s,%s::vector,%s,%s,%s,%s,%s,%s,%s)
                             ON CONFLICT (id) DO UPDATE SET
                              content=EXCLUDED.content, embedding=EXCLUDED.embedding,
                              summary=EXCLUDED.summary, enriched_at=EXCLUDED.enriched_at""",
                          (doc.get('id'), doc.get('content'),
                           json.dumps(emb) if emb else None,
                           doc.get('file_path'), doc.get('file_source'),
                           json.dumps(doc.get('metadata')) if doc.get('metadata') else None,
                           doc.get('summary'),
                           json.dumps(doc.get('entities')) if doc.get('entities') else None,
                           doc.get('doc_type'), doc.get('enriched_at'))
                      )
                      total += 1
                  except Exception as e:
                      errors += 1

              conn.commit()
              offset += batch
              if total % 500 == 0:
                  print(f'Progress: {total} migrated, {errors} errors')

          cur.close()
          conn.close()
          print(f'MIGRATION COMPLETE: {total} docs migrated, {errors} errors')

  verify:
    needs: migrate
    runs-on: ubuntu-latest
    steps:
      - name: Install deps
        run: pip install psycopg2-binary --break-system-packages -q

      - name: Verify Azure PostgreSQL
        env:
          AZURE_PG_PASSWORD: ${{ secrets.AZURE_POSTGRES_WB0414 }}
        shell: python
        run: |
          import psycopg2, os
          conn = psycopg2.connect(
              host='willbracken-pg-wb0414.postgres.database.azure.com',
              database='postgres', user='willbrackenadmin',
              password=os.environ['AZURE_PG_PASSWORD'], sslmode='require')
          cur = conn.cursor()
          cur.execute("SELECT COUNT(*), COUNT(embedding), COUNT(summary) FROM documents;")
          total, vecs, summs = cur.fetchone()
          print(f'Total docs: {total}')
          print(f'With embeddings: {vecs}')
          print(f'With summaries: {summs}')
          cur.execute("SELECT file_source, COUNT(*) FROM documents GROUP BY file_source ORDER BY 2 DESC;")
          for row in cur.fetchall():
              print(f'  {row[0]}: {row[1]}')
          cur.close()
          conn.close()
          print('Azure PostgreSQL is ready to replace Supabase for vector search')
