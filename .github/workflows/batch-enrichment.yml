name: Batch Enrichment
on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * *'
jobs:
  enrich:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Install deps
        run: pip install httpx --break-system-packages -q

      - name: Run enrichment
        env:
          AZURE_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          SB_URL: https://smttdhtpwkowcyatoztb.supabase.co
          SB_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          python3 << 'SCRIPT'
          import os, httpx, time, json
          URL = os.environ['SB_URL']
          KEY = os.environ['SB_KEY']
          AZ = os.environ['AZURE_KEY']
          EP = 'https://willbracken-aoai-ihe42a.openai.azure.com/'
          H = {'apikey': KEY, 'Authorization': f'Bearer {KEY}', 'Content-Type': 'application/json'}
          total = 0
          for offset in range(0, 90000, 200):
              r = httpx.get(f'{URL}/rest/v1/documents', headers=H,
                  params={'select':'id,content','enriched_at':'is.null','limit':'200','offset':str(offset)}, timeout=30)
              docs = r.json() if r.is_success else []
              if not isinstance(docs, list) or not docs:
                  break
              for doc in docs:
                  if not isinstance(doc, dict):
                      continue
                  content = str(doc.get('content') or '')
                  if len(content) < 100:
                      continue
                  try:
                      resp = httpx.post(
                          f'{EP}openai/deployments/gpt-4o-mini/chat/completions?api-version=2025-01-01-preview',
                          headers={'api-key': AZ, 'Content-Type': 'application/json'},
                          json={'messages':[
                              {'role':'system','content':'Summarize in 1-2 sentences. Include topic and document type.'},
                              {'role':'user','content':content[:2000]}
                          ],'max_tokens':100,'temperature':0}, timeout=20)
                      if resp.is_success:
                          summary = resp.json()['choices'][0]['message']['content']
                          httpx.patch(f'{URL}/rest/v1/documents', headers=H,
                              params={'id':f"eq.{doc['id']}"},
                              json={'summary':summary,'enriched_at':'now()'}, timeout=10)
                          total += 1
                          if total % 200 == 0:
                              print(f'Enriched: {total}', flush=True)
                          time.sleep(0.05)
                  except Exception as e:
                      pass
              print(f'Offset {offset}: {total} total enriched', flush=True)
          print(f'COMPLETE: {total} documents enriched')
          SCRIPT
