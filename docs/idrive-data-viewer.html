<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iDrive Data Viewer - Will Bracken</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
        }
        .tab-active {
            border-bottom: 3px solid #0ea5e9;
            color: #0ea5e9;
        }
        .storage-bar {
            background: linear-gradient(90deg, #0ea5e9 0%, #06b6d4 100%);
        }
        .status-badge {
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.875rem;
            font-weight: 500;
        }
        .status-keep { background-color: #10b981; color: white; }
        .status-delete { background-color: #ef4444; color: white; }
        .status-minimal { background-color: #8b5cf6; color: white; }
        .status-review { background-color: #f97316; color: white; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100">
    <div id="root"></div>
    <script type="text/babel">
        const { useState } = React;
        const mockDevices = [
            { id: 1, name: 'CLX-DESKTOP', type: 'Windows 11 Pro Desktop', size: 2.15, status: 'keep', lastBackup: '2026-04-22', backupCount: 2847, files: [{ name: 'Users/Documents', size: 0.85, items: 342 }, { name: 'Users/Projects', size: 0.92, items: 156 }, { name: 'Media', size: 0.38, items: 2341 }] },
            { id: 2, name: 'MacBookPro', type: 'macOS Laptop', size: 1.48, status: 'keep', lastBackup: '2026-04-21', backupCount: 1923, files: [{ name: 'Development', size: 0.76, items: 489 }, { name: 'Applications', size: 0.48, items: 234 }, { name: 'Photos', size: 0.24, items: 1203 }] },
            { id: 3, name: 'iPhone 16 Pro', type: 'iOS Device', size: 0.34, status: 'keep', lastBackup: '2026-04-22', backupCount: 847, files: [{ name: 'Photos & Videos', size: 0.22, items: 8934 }, { name: 'Documents', size: 0.12, items: 234 }] },
            { id: 4, name: 'WILL-DESKTOP-PC', type: 'Windows 10 Desktop (Old)', size: 0.78, status: 'delete', lastBackup: '2024-11-03', backupCount: 34, files: [{ name: 'Program Files', size: 0.47, items: 12342 }, { name: 'Users/Will/Documents', size: 0.19, items: 567 }, { name: 'AppData', size: 0.12, items: 4521 }] },
            { id: 5, name: 'DESKTOP-SPRO2', type: 'Surface Pro 2', size: 0.52, status: 'delete', lastBackup: '2024-08-15', backupCount: 12, files: [{ name: 'Program Files', size: 0.31, items: 8900 }, { name: 'Users/Documents', size: 0.14, items: 234 }, { name: 'Windows/System32', size: 0.07, items: 3400 }] },
            { id: 6, name: 'WILL-LENOVO-X', type: 'Lenovo ThinkPad X1', size: 0.67, status: 'delete', lastBackup: '2024-09-22', backupCount: 18, files: [{ name: 'Program Files', size: 0.40, items: 11234 }, { name: 'Users/Will', size: 0.18, items: 890 }, { name: 'AppData/Roaming', size: 0.09, items: 2100 }] },
            { id: 7, name: 'BRACKEN-LENOVO-X', type: 'Lenovo ThinkPad (Work)', size: 0.58, status: 'delete', lastBackup: '2024-07-14', backupCount: 8, files: [{ name: 'Program Files', size: 0.35, items: 9800 }, { name: 'Users/Bracken/Work', size: 0.15, items: 456 }, { name: 'AppData', size: 0.08, items: 1900 }] },
            { id: 8, name: 'BRACKEN-CLX-PC', type: 'CLX Desktop (Previous Build)', size: 0.89, status: 'delete', lastBackup: '2025-01-05', backupCount: 22, files: [{ name: 'Program Files', size: 0.53, items: 14500 }, { name: 'Users/Documents', size: 0.24, items: 1234 }, { name: 'Games/Saves', size: 0.12, items: 89 }] },
            { id: 9, name: 'WILL-ATLASSIAN', type: 'Dev Workstation', size: 0.45, status: 'delete', lastBackup: '2024-12-20', backupCount: 15, files: [{ name: 'Program Files', size: 0.22, items: 6700 }, { name: 'Repos', size: 0.18, items: 2340 }, { name: 'Docker/Images', size: 0.05, items: 12 }] },
            { id: 10, name: 'BRACKEN-LENOVO-SLIM', type: 'Lenovo Slim', size: 0.41, status: 'delete', lastBackup: '2024-06-10', backupCount: 9, files: [{ name: 'Program Files', size: 0.25, items: 7200 }, { name: 'Users/Documents', size: 0.11, items: 345 }, { name: 'AppData', size: 0.05, items: 890 }] },
            { id: 11, name: 'DESKTOP-A2N1AO0', type: 'Unknown Desktop', size: 0.63, status: 'delete', lastBackup: '2024-05-18', backupCount: 6, files: [{ name: 'Program Files', size: 0.38, items: 10100 }, { name: 'Users', size: 0.17, items: 678 }, { name: 'Windows/Temp', size: 0.08, items: 4500 }] },
            { id: 12, name: 'iPad', type: 'iPad', size: 0.10, status: 'minimal', lastBackup: '2025-03-15', backupCount: 45, files: [{ name: 'Photos', size: 0.07, items: 892 }, { name: 'Documents', size: 0.03, items: 34 }] },
            { id: 13, name: 'iPhone 13 Pro', type: 'iOS Device (Old)', size: 0.20, status: 'minimal', lastBackup: '2025-08-01', backupCount: 38, files: [{ name: 'Photos', size: 0.15, items: 3400 }, { name: 'App Data', size: 0.05, items: 120 }] }
        ];

        function StoragePieChart() {
            return (
                <svg viewBox="0 0 200 200" width="200" height="200">
                    <circle cx="100" cy="100" r="95" fill="none" stroke="#334155" strokeWidth="2"/>
                    <circle cx="100" cy="100" r="90" fill="none" stroke="#0ea5e9" strokeWidth="60" strokeDasharray="227 300" strokeDashoffset="0" opacity="0.8"/>
                    <circle cx="100" cy="100" r="90" fill="none" stroke="#06b6d4" strokeWidth="60" strokeDasharray="73 300" strokeDashoffset="-227" opacity="0.6"/>
                    <text x="100" y="90" textAnchor="middle" fill="#0ea5e9" fontSize="24" fontWeight="bold">83%</text>
                    <text x="100" y="115" textAnchor="middle" fill="#94a3b8" fontSize="14">Used</text>
                </svg>
            );
        }

        function OverviewTab() {
            return (
                <div className="space-y-6">
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                        <div className="bg-slate-800 p-4 rounded-lg border border-slate-700"><p className="text-slate-400 text-sm mb-2">Total Capacity</p><p className="text-3xl font-bold text-cyan-400">10 TB</p></div>
                        <div className="bg-slate-800 p-4 rounded-lg border border-slate-700"><p className="text-slate-400 text-sm mb-2">Used Space</p><p className="text-3xl font-bold text-blue-400">8.34 TB</p><p className="text-xs text-slate-500 mt-1">83% full</p></div>
                        <div className="bg-slate-800 p-4 rounded-lg border border-slate-700"><p className="text-slate-400 text-sm mb-2">Reclaimable</p><p className="text-3xl font-bold text-green-400">~6.0 TB</p><p className="text-xs text-slate-500 mt-1">8 deletable devices + junk</p></div>
                        <div className="bg-slate-800 p-4 rounded-lg border border-slate-700"><p className="text-slate-400 text-sm mb-2">To Keep</p><p className="text-3xl font-bold text-purple-400">~2.0 TB</p><p className="text-xs text-slate-500 mt-1">3 active + 2 minimal</p></div>
                    </div>
                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                        <div className="bg-slate-800 p-6 rounded-lg border border-slate-700"><h3 className="text-lg font-semibold mb-4">Storage Distribution</h3><div className="flex justify-center"><StoragePieChart /></div></div>
                        <div className="bg-slate-800 p-6 rounded-lg border border-slate-700"><h3 className="text-lg font-semibold mb-4">Device Status Summary</h3><div className="space-y-3">
                            <div className="flex justify-between items-center"><span className="text-slate-300">Keep (Active)</span><span className="status-badge status-keep">3 devices</span></div>
                            <div className="flex justify-between items-center"><span className="text-slate-300">Delete (Legacy)</span><span className="status-badge status-delete">8 devices</span></div>
                            <div className="flex justify-between items-center"><span className="text-slate-300">Minimal (Archive)</span><span className="status-badge status-minimal">2 devices</span></div>
                        </div></div>
                    </div>
                    <div className="bg-slate-800 p-6 rounded-lg border border-slate-700"><h3 className="text-lg font-semibold mb-4">Storage Breakdown</h3><div className="space-y-4">
                        <div><div className="flex justify-between mb-2"><span>Active Devices (3)</span><span className="text-cyan-400">3.97 TB</span></div><div className="w-full bg-slate-700 rounded h-2"><div className="storage-bar h-full rounded" style={{width: '47.6%'}}></div></div></div>
                        <div><div className="flex justify-between mb-2"><span>Legacy Devices (8)</span><span className="text-red-400">4.93 TB</span></div><div className="w-full bg-slate-700 rounded h-2"><div className="bg-red-500 h-full rounded" style={{width: '59.1%'}}></div></div></div>
                        <div><div className="flex justify-between mb-2"><span>Minimal (2)</span><span className="text-purple-400">0.30 TB</span></div><div className="w-full bg-slate-700 rounded h-2"><div className="bg-purple-500 h-full rounded" style={{width: '3.6%'}}></div></div></div>
                    </div></div>
                </div>
            );
        }

        function DeviceCard({ device, isExpanded, onToggle }) {
            const statusColors = { keep: 'status-keep', delete: 'status-delete', minimal: 'status-minimal', review: 'status-review' };
            return (
                <div className="bg-slate-800 p-4 rounded-lg border border-slate-700 hover:border-slate-600 transition">
                    <div className="flex items-center justify-between mb-3">
                        <div className="flex-1"><h4 className="text-lg font-semibold text-slate-100">{device.name}</h4><p className="text-sm text-slate-400">{device.type}</p></div>
                        <span className={`status-badge ${statusColors[device.status]}`}>{device.status.charAt(0).toUpperCase() + device.status.slice(1)}</span>
                    </div>
                    <div className="grid grid-cols-3 gap-3 mb-4">
                        <div><p className="text-xs text-slate-500">Size</p><p className="text-lg font-semibold text-cyan-400">{device.size.toFixed(2)} TB</p></div>
                        <div><p className="text-xs text-slate-500">Last Backup</p><p className="text-sm font-semibold text-slate-300">{device.lastBackup}</p></div>
                        <div><p className="text-xs text-slate-500">Files</p><p className="text-lg font-semibold text-slate-300">{device.backupCount.toLocaleString()}</p></div>
                    </div>
                    <button onClick={() => onToggle(device.id)} className="w-full px-3 py-2 bg-slate-700 hover:bg-slate-600 rounded transition text-sm text-slate-300">{isExpanded ? 'Hide Files' : 'Show Files'} ({device.files.length} folders)</button>
                    {isExpanded && (<div className="mt-4 space-y-2">{device.files.map((file, idx) => (
                        <div key={idx} className="bg-slate-700 p-3 rounded text-sm"><div className="flex justify-between mb-1"><span className="text-slate-200">{file.name}</span><span className="text-slate-400">{(file.size * 1024).toFixed(0)} GB</span></div>
                        <div className="w-full bg-slate-600 rounded h-1 mt-1"><div className="bg-cyan-500 h-full rounded" style={{width: `${(file.size / device.size) * 100}%`}}></div></div>
                        <p className="text-xs text-slate-500 mt-1">{file.items.toLocaleString()} items</p></div>))}</div>)}
                </div>
            );
        }

        function DevicesTab() {
            const [expanded, setExpanded] = useState({});
            const [filter, setFilter] = useState('all');
            const toggleExpand = (id) => setExpanded(prev => ({ ...prev, [id]: !prev[id] }));
            const filtered = filter === 'all' ? mockDevices : mockDevices.filter(d => d.status === filter);
            return (
                <div className="space-y-4">
                    <div className="flex gap-2 mb-4">
                        {['all', 'keep', 'delete', 'minimal'].map(f => (
                            <button key={f} onClick={() => setFilter(f)} className={`px-4 py-2 rounded text-sm font-medium transition ${filter === f ? 'bg-cyan-600 text-white' : 'bg-slate-700 text-slate-300 hover:bg-slate-600'}`}>{f === 'all' ? 'All' : f.charAt(0).toUpperCase() + f.slice(1)} ({f === 'all' ? mockDevices.length : mockDevices.filter(d => d.status === f).length})</button>
                        ))}
                    </div>
                    {filtered.map(device => (<DeviceCard key={device.id} device={device} isExpanded={expanded[device.id] || false} onToggle={toggleExpand} />))}
                </div>
            );
        }

        function CleanupPlanTab() {
            const toDelete = mockDevices.filter(d => d.status === 'delete');
            const toKeep = mockDevices.filter(d => d.status === 'keep');
            const deletableSpace = toDelete.reduce((sum, d) => sum + d.size, 0);
            return (
                <div className="space-y-6">
                    <div className="bg-gradient-to-r from-red-900/30 to-slate-800 p-6 rounded-lg border border-red-800/50">
                        <h3 className="text-xl font-semibold mb-2">Cleanup Summary</h3>
                        <div className="grid grid-cols-3 gap-4 mt-4">
                            <div><p className="text-slate-400 text-sm">Space to Free</p><p className="text-3xl font-bold text-red-400">{deletableSpace.toFixed(1)} TB</p></div>
                            <div><p className="text-slate-400 text-sm">Devices to Delete</p><p className="text-3xl font-bold text-red-400">{toDelete.length}</p></div>
                            <div><p className="text-slate-400 text-sm">Post-Cleanup Used</p><p className="text-3xl font-bold text-green-400">~2.3 TB</p></div>
                        </div>
                    </div>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div className="bg-slate-800 p-6 rounded-lg border border-slate-700"><h4 className="text-lg font-semibold mb-4 flex items-center"><span className="w-3 h-3 bg-red-500 rounded-full mr-2"></span>Delete ({toDelete.length} devices)</h4><div className="space-y-2">{toDelete.map(d => (<div key={d.id} className="flex justify-between items-center text-sm"><span className="text-slate-300">{d.name}</span><span className="text-red-400">{(d.size * 1024).toFixed(0)} GB</span></div>))}</div></div>
                        <div className="bg-slate-800 p-6 rounded-lg border border-slate-700"><h4 className="text-lg font-semibold mb-4 flex items-center"><span className="w-3 h-3 bg-green-500 rounded-full mr-2"></span>Keep ({toKeep.length} devices)</h4><div className="space-y-2">{toKeep.map(d => (<div key={d.id} className="flex justify-between items-center text-sm"><span className="text-slate-300">{d.name}</span><span className="text-green-400">{(d.size * 1024).toFixed(0)} GB</span></div>))}</div></div>
                    </div>
                    <div className="bg-slate-800 p-6 rounded-lg border border-slate-700"><h4 className="text-lg font-semibold mb-4">Cleanup Steps</h4><ol className="space-y-3">
                        {['Scan old devices for unique Documents/Photos (skip Program Files, AppData, Windows folders)', 'Move any valuable files from legacy devices to CLX-DESKTOP or MacBookPro backup', 'Unlink and delete legacy device backups one at a time', 'Consolidate iPad + iPhone 13 Pro data into iPhone 16 Pro backup', 'Enable iDrive Cloud Drive (10TB unused) for active file sync'].map((step, i) => (
                            <li key={i} className="flex gap-3"><span className="bg-blue-500 text-white rounded-full w-6 h-6 flex items-center justify-center text-xs flex-shrink-0">{i+1}</span><span className="text-slate-300">{step}</span></li>
                        ))}
                    </ol></div>
                </div>
            );
        }

        function StorageTiersTab() {
            const tiers = [
                { name: 'HOT', icon: '🔥', color: 'red', desc: 'Millisecond access', items: ['Local SSD', 'Supabase pgvector', 'Cloudflare D1 Edge'], size: '~500 GB active' },
                { name: 'WARM', icon: '☁️', color: 'orange', desc: 'Seconds access', items: ['Google Drive', 'OneDrive', 'DuckDB', 'CockroachDB'], size: '~30 GB sync' },
                { name: 'COLD', icon: '❄️', color: 'blue', desc: 'Minutes access', items: ['Cloudflare R2', 'HDD H: Drive (3.7TB)', 'NordCloud (3TB)'], size: '~6.7 TB capacity' },
                { name: 'FROZEN', icon: '🧊', color: 'slate', desc: 'On-demand only', items: ['iDrive backups', 'Old PC archives', 'Historical data'], size: '~2 TB after cleanup' }
            ];
            return (
                <div className="space-y-6">
                    <div className="bg-slate-800 p-6 rounded-lg border border-slate-700"><h3 className="text-xl font-semibold mb-6">Storage Architecture</h3>
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">{tiers.map(t => (
                            <div key={t.name} className={`bg-gradient-to-br from-${t.color}-900/30 to-slate-900 p-4 rounded-lg border border-${t.color}-800/30`}>
                                <h4 className={`font-semibold text-${t.color}-400 mb-3 flex items-center`}><span className="text-2xl mr-2">{t.icon}</span> {t.name}</h4>
                                <p className="text-sm text-slate-300 mb-3">{t.desc}</p>
                                <div className="space-y-1 text-xs text-slate-400">{t.items.map((item, i) => <p key={i}>{item}</p>)}</div>
                                <p className={`text-lg font-semibold text-${t.color}-400 mt-3`}>{t.size}</p>
                            </div>
                        ))}</div>
                    </div>
                    <div className="bg-slate-800 p-6 rounded-lg border border-slate-700"><h4 className="text-lg font-semibold mb-4">Auto-Archive Rules (Phase 7)</h4><div className="space-y-2 text-sm text-slate-300">
                        <p>• Files not accessed in 90 days → HOT → WARM</p>
                        <p>• Files not accessed in 180 days → WARM → COLD (R2 or H: drive)</p>
                        <p>• Files not accessed in 365 days → COLD → FROZEN (iDrive or NordCloud)</p>
                        <p>• Always keep: source code, configs, credentials, docs {'<'} 1 year old</p>
                    </div></div>
                </div>
            );
        }

        function CloudDriveTab() {
            return (
                <div className="space-y-6">
                    <div className="bg-gradient-to-r from-cyan-900/30 to-slate-800 p-6 rounded-lg border border-cyan-800/50">
                        <h3 className="text-2xl font-semibold mb-2 text-cyan-400">iDrive Cloud Drive — 10 TB Untapped</h3>
                        <p className="text-slate-300">Your plan includes 10 TB of Cloud Drive sync space, completely unused.</p>
                    </div>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div className="bg-slate-800 p-6 rounded-lg border border-slate-700"><h4 className="text-lg font-semibold mb-4">Current State</h4><div className="space-y-3">
                            <div className="flex justify-between"><span className="text-slate-300">Total Cloud Drive</span><span className="text-cyan-400 font-semibold">10 TB</span></div>
                            <div className="flex justify-between"><span className="text-slate-300">Used</span><span className="text-blue-400 font-semibold">0 KB</span></div>
                            <div className="flex justify-between"><span className="text-slate-300">Available</span><span className="text-green-400 font-semibold">10 TB</span></div>
                            <div className="border-t border-slate-700 pt-3 mt-3"><p className="text-slate-400 text-sm">Separate from backup storage — this is real-time file sync like Google Drive or OneDrive</p></div>
                        </div></div>
                        <div className="bg-slate-800 p-6 rounded-lg border border-slate-700"><h4 className="text-lg font-semibold mb-4">Recommended Use Cases</h4><ul className="space-y-2 text-sm">
                            {['Cross-device project sync (replace some GDrive/OneDrive usage)', 'MacBook SSD overflow — mount as network drive', 'Warm storage tier for semi-active documents', 'Encrypted document sharing between machines', 'Backup landing zone before archiving to R2/NordCloud'].map((item, i) => (
                                <li key={i} className="flex gap-2"><span className="text-cyan-400">✓</span><span>{item}</span></li>
                            ))}
                        </ul></div>
                    </div>
                    <div className="bg-gradient-to-r from-green-900/30 to-slate-800 p-6 rounded-lg border border-green-800/50">
                        <h4 className="text-lg font-semibold mb-3 text-green-400">Zero Cost — Already Included</h4>
                        <p className="text-sm text-slate-300">Cloud Drive is part of your 10TB Personal Yearly plan (renews Jan 2027, card ending 7705). No additional cost to activate. Enable it in the iDrive web portal → Cloud Drive section.</p>
                    </div>
                </div>
            );
        }

        function App() {
            const [activeTab, setActiveTab] = useState('overview');
            const tabs = [
                { id: 'overview', label: 'Overview', component: OverviewTab },
                { id: 'devices', label: 'Devices (13)', component: DevicesTab },
                { id: 'cleanup', label: 'Cleanup Plan', component: CleanupPlanTab },
                { id: 'tiers', label: 'Storage Tiers', component: StorageTiersTab },
                { id: 'cloud', label: 'Cloud Drive', component: CloudDriveTab }
            ];
            return (
                <div className="min-h-screen bg-slate-900">
                    <div className="max-w-6xl mx-auto p-6">
                        <header className="mb-8"><h1 className="text-4xl font-bold text-cyan-400 mb-2">iDrive Data Viewer</h1><p className="text-slate-400">Account: will.i.bracken@icloud.com | 10 TB Personal Yearly | Next renewal: Jan 2027</p></header>
                        <div className="bg-slate-800 rounded-lg border border-slate-700 overflow-hidden">
                            <div className="flex border-b border-slate-700 overflow-x-auto">{tabs.map(tab => (
                                <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`px-6 py-4 font-medium transition whitespace-nowrap ${activeTab === tab.id ? 'tab-active' : 'text-slate-400 hover:text-slate-200'}`}>{tab.label}</button>
                            ))}</div>
                            <div className="p-6">{tabs.map(tab => { const C = tab.component; return activeTab === tab.id && <div key={tab.id}><C /></div>; })}</div>
                        </div>
                        <footer className="mt-8 text-center text-slate-500 text-sm"><p>iDrive Data Viewer | Generated 2026-04-22 | BrackenW3 Infrastructure Project</p></footer>
                    </div>
                </div>
            );
        }
        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
