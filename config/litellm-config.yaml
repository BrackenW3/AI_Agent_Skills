# LiteLLM Config v2 — 4 tiers, test and cut what doesn't earn its place
# Master key: sk-wb-litellm-master
# All via OpenRouter unless noted

model_list:

  # ── TIER 0: FREE ─────────────────────────────────────────────
  # Use for: enrichment, summarization, first drafts, anything bulk

  - model_name: free-deepseek-r1
    litellm_params:
      model: openrouter/deepseek/deepseek-r1:free
      api_key: os.environ/OPENROUTER_API_KEY
      api_base: https://openrouter.ai/api/v1

  - model_name: free-llama
    litellm_params:
      model: openrouter/meta-llama/llama-3.3-70b-instruct:free
      api_key: os.environ/OPENROUTER_API_KEY
      api_base: https://openrouter.ai/api/v1

  - model_name: free-gemini-flash
    litellm_params:
      model: openrouter/google/gemini-2.5-flash-lite
      api_key: os.environ/OPENROUTER_API_KEY
      api_base: https://openrouter.ai/api/v1

  # ── TIER 1: CHEAP WORKHORSE (<$2/M) ──────────────────────────
  # Use for: n8n workflows, agents, most coding, structured tasks

  - model_name: deepseek-v3
    litellm_params:
      model: openrouter/deepseek/deepseek-v3
      api_key: os.environ/OPENROUTER_API_KEY
      api_base: https://openrouter.ai/api/v1

  - model_name: kimi-k2-5
    litellm_params:
      model: openrouter/moonshotai/kimi-k2.5
      api_key: os.environ/OPENROUTER_API_KEY
      api_base: https://openrouter.ai/api/v1

  - model_name: kimi-k2-6          # just released, beats GPT-5.4 on coding
    litellm_params:
      model: openrouter/moonshotai/kimi-k2.5  # update ID when available
      api_key: os.environ/OPENROUTER_API_KEY
      api_base: https://openrouter.ai/api/v1

  - model_name: minimax
    litellm_params:
      model: openrouter/minimax/minimax-m2.5
      api_key: os.environ/OPENROUTER_API_KEY
      api_base: https://openrouter.ai/api/v1

  - model_name: gpt-5-mini
    litellm_params:
      model: openrouter/openai/gpt-5-mini
      api_key: os.environ/OPENROUTER_API_KEY
      api_base: https://openrouter.ai/api/v1

  - model_name: gpt-5-nano
    litellm_params:
      model: openrouter/openai/gpt-5-nano
      api_key: os.environ/OPENROUTER_API_KEY
      api_base: https://openrouter.ai/api/v1

  - model_name: grok-4-fast
    litellm_params:
      model: openrouter/x-ai/grok-4.1-fast
      api_key: os.environ/OPENROUTER_API_KEY
      api_base: https://openrouter.ai/api/v1

  - model_name: qwen3-235b
    litellm_params:
      model: openrouter/qwen/qwen3-235b-a22b
      api_key: os.environ/OPENROUTER_API_KEY
      api_base: https://openrouter.ai/api/v1

  - model_name: zai-glm5           # ZAI specific models
    litellm_params:
      model: openrouter/z-ai/glm-5
      api_key: os.environ/OPENROUTER_API_KEY
      api_base: https://openrouter.ai/api/v1

  # ── TIER 2: MID ($2-10/M) ────────────────────────────────────
  # Use for: complex tasks, final outputs, when tier 1 isn't enough

  - model_name: gpt-5
    litellm_params:
      model: openrouter/openai/gpt-5
      api_key: os.environ/OPENROUTER_API_KEY
      api_base: https://openrouter.ai/api/v1

  - model_name: gpt-5-1
    litellm_params:
      model: openrouter/openai/gpt-5.1
      api_key: os.environ/OPENROUTER_API_KEY
      api_base: https://openrouter.ai/api/v1

  - model_name: gpt-5-2
    litellm_params:
      model: openrouter/openai/gpt-5.2
      api_key: os.environ/OPENROUTER_API_KEY
      api_base: https://openrouter.ai/api/v1

  - model_name: grok-3
    litellm_params:
      model: openrouter/x-ai/grok-3
      api_key: os.environ/OPENROUTER_API_KEY
      api_base: https://openrouter.ai/api/v1

  - model_name: grok-4
    litellm_params:
      model: openrouter/x-ai/grok-4
      api_key: os.environ/OPENROUTER_API_KEY
      api_base: https://openrouter.ai/api/v1

  - model_name: mistral-large
    litellm_params:
      model: openrouter/mistralai/mistral-large
      api_key: os.environ/OPENROUTER_API_KEY
      api_base: https://openrouter.ai/api/v1

  - model_name: codestral           # coding specific
    litellm_params:
      model: openrouter/mistralai/codestral-2508
      api_key: os.environ/OPENROUTER_API_KEY
      api_base: https://openrouter.ai/api/v1

  # ── TIER 3: HIGH-END (use sparingly) ─────────────────────────
  # Use for: genuinely hard problems only, not default

  - model_name: gpt-5-3-codex      # your pick for coding
    litellm_params:
      model: openrouter/openai/gpt-5.3-chat
      api_key: os.environ/OPENROUTER_API_KEY
      api_base: https://openrouter.ai/api/v1

  - model_name: gpt-5-2-pro
    litellm_params:
      model: openrouter/openai/gpt-5.2-pro
      api_key: os.environ/OPENROUTER_API_KEY
      api_base: https://openrouter.ai/api/v1

  - model_name: gpt-oss-120b       # open weights, frontier level
    litellm_params:
      model: openrouter/openai/gpt-oss-120b
      api_key: os.environ/OPENROUTER_API_KEY
      api_base: https://openrouter.ai/api/v1

  # ── LOCAL (i9 RTX 4080, free) ─────────────────────────────────
  - model_name: local-qwen
    litellm_params:
      model: ollama/qwen2.5-coder:14b
      api_base: http://192.168.1.21:11434

  - model_name: local-embed
    litellm_params:
      model: ollama/nomic-embed-text
      api_base: http://192.168.1.21:11434

  # ── SMART ALIASES (pick best for task type) ───────────────────
  - model_name: code               # default for coding tasks
    litellm_params:
      model: kimi-k2-5

  - model_name: fast               # default for speed-sensitive
    litellm_params:
      model: gpt-5-nano

  - model_name: smart              # default general
    litellm_params:
      model: gpt-5-1

  - model_name: free               # default zero-cost
    litellm_params:
      model: free-deepseek-r1

# ── ROUTING ──────────────────────────────────────────────────────
router_settings:
  routing_strategy: latency-based-routing
  allowed_fails: 2
  cooldown_time: 30

# ── LANGFUSE LOGGING ─────────────────────────────────────────────
litellm_settings:
  success_callback: ["langfuse"]
  failure_callback: ["langfuse"]
  langfuse_host: https://langfuse.orangegrass-ad6d20d5.eastus.azurecontainerapps.io

# ── BUDGET SAFETY ────────────────────────────────────────────────
general_settings:
  master_key: sk-wb-litellm-master
  max_budget: 50
  budget_duration: 1mo
