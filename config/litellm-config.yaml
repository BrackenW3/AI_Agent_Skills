# LiteLLM Master Config
# Deploy this as LITELLM_CONFIG environment variable or mount as file
# All routes go through: https://litellm.willbracken.com/v1/chat/completions
# Master key: sk-wb-litellm-master

model_list:

  # ── ANTHROPIC DIRECT ─────────────────────────────────────────
  - model_name: claude-sonnet          # what you call it
    litellm_params:
      model: anthropic/claude-sonnet-4-6
      api_key: os.environ/ANTHROPIC_API_KEY

  - model_name: claude-opus
    litellm_params:
      model: anthropic/claude-opus-4-6
      api_key: os.environ/ANTHROPIC_API_KEY

  - model_name: claude-haiku
    litellm_params:
      model: anthropic/claude-haiku-20240307
      api_key: os.environ/ANTHROPIC_API_KEY

  # ── OPENROUTER ────────────────────────────────────────────────
  - model_name: or-gpt4o
    litellm_params:
      model: openrouter/openai/gpt-4o
      api_key: os.environ/OPENROUTER_API_KEY
      api_base: https://openrouter.ai/api/v1

  - model_name: or-deepseek
    litellm_params:
      model: openrouter/deepseek/deepseek-v3.2
      api_key: os.environ/OPENROUTER_API_KEY
      api_base: https://openrouter.ai/api/v1

  - model_name: or-gemini-flash
    litellm_params:
      model: openrouter/google/gemini-3.1-flash
      api_key: os.environ/OPENROUTER_API_KEY
      api_base: https://openrouter.ai/api/v1

  - model_name: or-free-deepseek-r1    # FREE tier
    litellm_params:
      model: openrouter/deepseek/deepseek-r1:free
      api_key: os.environ/OPENROUTER_API_KEY
      api_base: https://openrouter.ai/api/v1

  # ── ZAI (GLM models) ──────────────────────────────────────────
  - model_name: zai-glm4
    litellm_params:
      model: openai/glm-4-flash          # ZAI uses OpenAI-compatible API
      api_key: os.environ/ZAI_API_KEY
      api_base: https://open.bigmodel.cn/api/paas/v4

  - model_name: zai-glm4-long
    litellm_params:
      model: openai/glm-4-long
      api_key: os.environ/ZAI_API_KEY
      api_base: https://open.bigmodel.cn/api/paas/v4

  # ── AZURE OPENAI ──────────────────────────────────────────────
  - model_name: azure-gpt4o-mini
    litellm_params:
      model: azure/gpt-4o-mini
      api_key: os.environ/AZURE_OPENAI_API_KEY
      api_base: https://willbracken-aoai-ihe42a.openai.azure.com/
      api_version: "2025-01-01-preview"

  - model_name: azure-embed
    litellm_params:
      model: azure/text-embedding-3-small
      api_key: os.environ/AZURE_OPENAI_API_KEY
      api_base: https://willbracken-aoai-ihe42a.openai.azure.com/
      api_version: "2025-01-01-preview"

  # ── LOCAL OLLAMA (i9 RTX 4080) ────────────────────────────────
  - model_name: local-qwen3
    litellm_params:
      model: ollama/qwen3:8b
      api_base: http://192.168.1.21:11434   # i9 local IP

  - model_name: local-coder
    litellm_params:
      model: ollama/qwen2.5-coder:14b
      api_base: http://192.168.1.21:11434

  - model_name: local-embed
    litellm_params:
      model: ollama/nomic-embed-text
      api_base: http://192.168.1.21:11434

  # ── ROUTER: SMART DEFAULTS ────────────────────────────────────
  # Use these instead of specific models — LiteLLM picks best available
  - model_name: smart                   # Best quality, any cost
    litellm_params:
      model: claude-sonnet
    model_info:
      mode: chat

  - model_name: fast                    # Fastest, cheapest
    litellm_params:
      model: or-deepseek
    model_info:
      mode: chat

  - model_name: free                    # Zero cost
    litellm_params:
      model: or-free-deepseek-r1
    model_info:
      mode: chat

# ── ROUTING STRATEGY ─────────────────────────────────────────────
router_settings:
  routing_strategy: latency-based-routing
  allowed_fails: 2
  cooldown_time: 30

# ── LANGFUSE LOGGING (auto-logs everything) ───────────────────────
litellm_settings:
  success_callback: ["langfuse"]
  failure_callback: ["langfuse"]
  langfuse_public_key: os.environ/LANGFUSE_PUBLIC_KEY
  langfuse_secret_key: os.environ/LANGFUSE_SECRET_KEY
  langfuse_host: https://langfuse.orangegrass-ad6d20d5.eastus.azurecontainerapps.io

# ── BUDGET CONTROLS ───────────────────────────────────────────────
general_settings:
  master_key: sk-wb-litellm-master
  database_url: os.environ/DATABASE_URL   # logs to CockroachDB

  # Global spend limit — safety net
  max_budget: 50           # $50/month total across all models
  budget_duration: 1mo

  # Per-model limits
  default_team_settings:
    max_budget: 10
    budget_duration: 1mo
